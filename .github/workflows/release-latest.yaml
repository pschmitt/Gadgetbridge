name: Release (latest)

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release-latest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if this commit already has a tagged release
        id: tagcheck
        run: |
          tag=$(git tag --points-at HEAD | grep -E '^v' | head -n1 || true)
          if [ -n "$tag" ]; then
            echo "HEAD is already tagged as $tag (has a real release with an APK) — skipping the latest build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Export ANDROID_HOME
        if: steps.tagcheck.outputs.skip != 'true'
        run: echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"

      - name: Set up JDK 21
        if: steps.tagcheck.outputs.skip != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Cache Android SDK platform/build-tools
        if: steps.tagcheck.outputs.skip != 'true'
        id: android-sdk-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/platforms/android-36.1
            ${{ env.ANDROID_HOME }}/build-tools/36.1.0
          key: android-sdk-36.1-${{ runner.os }}

      - name: Accept Android SDK licenses
        if: steps.tagcheck.outputs.skip != 'true' && steps.android-sdk-cache.outputs.cache-hit != 'true'
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true

      - name: Install Android SDK platform/build-tools
        if: steps.tagcheck.outputs.skip != 'true' && steps.android-sdk-cache.outputs.cache-hit != 'true'
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" 'platforms;android-36.1' 'build-tools;36.1.0'

      - name: Build mainline nightly APK
        if: steps.tagcheck.outputs.skip != 'true'
        run: ./gradlew assembleMainlineNightly --stacktrace --build-cache

      - name: Rename APK to a fixed filename
        if: steps.tagcheck.outputs.skip != 'true'
        id: apk
        run: |
          src=$(find app/build/outputs/apk/mainline/nightly -name '*.apk' | head -n1)
          if [ -z "$src" ]; then
            echo "No APK found" >&2
            exit 1
          fi
          dest="$(dirname "$src")/gadgetbridge-latest.apk"
          mv "$src" "$dest"
          echo "path=$dest" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        if: steps.tagcheck.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gadgetbridge-latest-apk
          path: ${{ steps.apk.outputs.path }}
          retention-days: 14

      - name: Move latest tag
        if: steps.tagcheck.outputs.skip != 'true'
        run: |
          git tag -f latest
          git push origin latest --force

      - name: Record build time
        if: steps.tagcheck.outputs.skip != 'true'
        id: date
        run: echo "date=$(date -u +'%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"

      - name: Publish latest release
        if: steps.tagcheck.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build"
          body: |
            Automated build of the latest master (${{ github.sha }}), built ${{ steps.date.outputs.date }}.

            Not a stable release — see [tagged releases](../../releases) for those.
          files: ${{ steps.apk.outputs.path }}
          prerelease: false
          make_latest: true
