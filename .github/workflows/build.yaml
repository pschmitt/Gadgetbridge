name: Build

on:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Export ANDROID_HOME
        run: echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Cache Android SDK platform/build-tools
        id: android-sdk-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/platforms/android-36.1
            ${{ env.ANDROID_HOME }}/build-tools/36.1.0
          key: android-sdk-36.1-${{ runner.os }}

      - name: Accept Android SDK licenses
        if: steps.android-sdk-cache.outputs.cache-hit != 'true'
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true

      - name: Install Android SDK platform/build-tools
        if: steps.android-sdk-cache.outputs.cache-hit != 'true'
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" 'platforms;android-36.1' 'build-tools;36.1.0'

      - name: Build mainline debug APK
        run: ./gradlew assembleMainlineDebug --stacktrace --build-cache

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gadgetbridge-debug-apk
          path: app/build/outputs/apk/mainline/debug/*.apk
          retention-days: 14
