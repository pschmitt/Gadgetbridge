name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true

      - name: Install Android SDK platform/build-tools
        run: "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" 'platforms;android-36.1' 'build-tools;36.1.0'

      - name: Lint
        run: ./gradlew lint --stacktrace

      - name: Test
        run: ./gradlew test --stacktrace

      - name: Build mainline nightly APK
        run: ./gradlew assembleMainlineNightly --stacktrace

      - name: Locate APK
        id: apk
        run: |
          apk_path=$(find app/build/outputs/apk/mainline/nightly -name '*.apk' | head -n1)
          if [ -z "$apk_path" ]; then
            echo "No APK found" >&2
            exit 1
          fi
          echo "path=$apk_path" >> "$GITHUB_OUTPUT"

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true
          draft: false
          prerelease: false
