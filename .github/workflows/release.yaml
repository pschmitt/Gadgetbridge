name: Release (tag)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Export ANDROID_HOME
        run: echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Cache Android SDK platform/build-tools
        id: android-sdk-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/platforms/android-36.1
            ${{ env.ANDROID_HOME }}/build-tools/36.1.0
          key: android-sdk-36.1-${{ runner.os }}

      - name: Accept Android SDK licenses
        if: steps.android-sdk-cache.outputs.cache-hit != 'true'
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true

      - name: Install Android SDK platform/build-tools
        if: steps.android-sdk-cache.outputs.cache-hit != 'true'
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" 'platforms;android-36.1' 'build-tools;36.1.0'

      - name: Lint
        run: ./gradlew lint --stacktrace --build-cache

      - name: Test
        run: ./gradlew test --stacktrace --build-cache

      - name: Decode nightly signing keystore
        id: keystore
        run: |
          path="$RUNNER_TEMP/nightly.keystore"
          echo "${{ secrets.NIGHTLY_KEYSTORE_BASE64 }}" | base64 -d > "$path"
          echo "path=$path" >> "$GITHUB_OUTPUT"

      - name: Build mainline nightly APK
        run: |
          ./gradlew assembleMainlineNightly --stacktrace --build-cache \
            -Dnightly_store_file=${{ steps.keystore.outputs.path }} \
            -Dnightly_store_password=${{ secrets.NIGHTLY_STORE_PASSWORD }} \
            -Dnightly_key_alias=${{ secrets.NIGHTLY_KEY_ALIAS }} \
            -Dnightly_key_password=${{ secrets.NIGHTLY_KEY_PASSWORD }}

      - name: Locate APK
        id: apk
        run: |
          apk_path=$(find app/build/outputs/apk/mainline/nightly -name '*.apk' | head -n1)
          if [ -z "$apk_path" ]; then
            echo "No APK found" >&2
            exit 1
          fi
          echo "path=$apk_path" >> "$GITHUB_OUTPUT"

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true
          draft: false
          prerelease: false
